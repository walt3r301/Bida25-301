<header> 
    
 <h1>Skin Quiz</h1>

</header> 
<form
  action="https://formspree.io/f/{FORM_ID}"
  class="fs-form"
  target="_top"
  method="POST"
>
 
  <div class="fs-field">
    <label class="fs-label" for="score-reason">
      What is the primary reason for your score?
    </label>

    <textarea
      class="fs-textarea"
      id="score-reason"
      name="score-reason"
      placeholder="Explain why you gave us this score"
      required
    ></textarea>
  </div>

  <div class="fs-field">
    <label class="fs-label" for="improvement-suggestion">
      What could we do to improve your experience?
    </label>

    <textarea
      class="fs-textarea"
      id="improvement-suggestion"
      name="improvement-suggestion"
      placeholder="Let us know what we can improve (optional)"
    ></textarea>
  </div>

  <div class="fs-field">
    <label class="fs-label" for="positive-feedback">What did we do well?</label>
    <textarea
      class="fs-textarea"
      id="positive-feedback"
      name="positive-feedback"
      placeholder="Tell us what worked well for you (optional)"
    ></textarea>
  </div>

</form>

<footer> 

     <p>&copy; 2026 Skin Awarness</p>  

</footer>

</body>
